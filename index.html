<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meerwaardebelasting Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 1.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; color: var(--primary); }
        h2 { font-size: 1.25rem; margin-top: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; color: var(--secondary); }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--accent);
            padding: 1.5rem;
            border-radius: 8px;
            align-items: flex-end;
        }
        .input-field { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--secondary); }
        input {
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        input.calculated { background-color: #f8fafc; color: #64748b; font-style: italic; }
        
        button {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            border: none;
        }
        button:active { transform: scale(0.98); }
        .btn-add { background-color: var(--primary); color: white; }
        .btn-remove { background-color: #fee2e2; color: var(--danger); padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .btn-remove:hover { background-color: var(--danger); color: white; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; min-width: 600px; }
        th { text-align: left; padding: 1rem; font-size: 0.85rem; color: var(--secondary); border-bottom: 2px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); }
        
        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
        }
        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.9rem; color: var(--secondary); }
        .stat-value { font-size: 1.5rem; font-weight: 800; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        .chart-container { height: 350px; position: relative; }
        
        .info-text { font-size: 0.85rem; color: var(--secondary); text-align: center; margin-top: 1rem; }
        .asset-tag { display: inline-block; padding: 0.2rem 0.5rem; background: #e2e8f0; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-right: 0.5rem; }
        .hint { font-size: 0.7rem; color: var(--secondary); font-weight: 400; text-transform: none; margin-top: -0.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Meerwaardebelasting Calculator</h1>
        <p class="info-text">Host je eigen berekening voor vermogenswinstbelasting.</p>
        
        <div class="form-grid">
            <div class="input-field">
                <label>Asset <span class="hint">(bv. BTC)</span></label>
                <input type="text" id="asset-name" placeholder="Naam">
            </div>
            <div class="input-field">
                <label>Aantal</label>
                <input type="number" id="buy-quantity" placeholder="0" step="any" oninput="recalc('quantity')">
            </div>
            <div class="input-field">
                <label>Eenheidsprijs (€)</label>
                <input type="number" id="buy-price" placeholder="0.00" step="any" oninput="recalc('price')">
            </div>
            <div class="input-field">
                <label>Totale Aankoop (€)</label>
                <input type="number" id="buy-total" placeholder="0.00" step="any" oninput="recalc('total')">
            </div>
            <div class="input-field">
                <label>Order / Datum</label>
                <input type="text" id="buy-order" placeholder="Optioneel">
            </div>
            <button class="btn-add" onclick="addEntry()">Toevoegen</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Asset & Order</th>
                        <th>Aantal</th>
                        <th>Eenheidsprijs</th>
                        <th>Totaal Betaald</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="entries-body"></tbody>
            </table>
        </div>

        <div class="summary-box">
            <div class="stat">
                <span class="stat-label">Totale Investering (np₁)</span>
                <span class="stat-value" id="total-investment">€ 0,00</span>
            </div>
            <div class="stat">
                <span class="stat-label">Vrijstellingsgrens</span>
                <span class="stat-value" style="color: var(--success);">€ 10.000,00</span>
            </div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="card">
            <h2>Portefeuillewaarde</h2>
            <div class="chart-container">
                <canvas id="valueChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h2>Meerwaarde & Belasting</h2>
            <div class="chart-container">
                <canvas id="taxChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let entries = [];
        let valueChart = null;
        let taxChart = null;

        function recalc(source) {
            const q = document.getElementById('buy-quantity');
            const p = document.getElementById('buy-price');
            const t = document.getElementById('buy-total');

            const quantity = parseFloat(q.value);
            const price = parseFloat(p.value);
            const total = parseFloat(t.value);

            if (source === 'quantity' || source === 'price') {
                if (!isNaN(quantity) && !isNaN(price)) {
                    t.value = (quantity * price).toFixed(4);
                    t.classList.add('calculated');
                } else {
                    t.classList.remove('calculated');
                }
            } else if (source === 'total') {
                t.classList.remove('calculated');
                if (!isNaN(total)) {
                    if (!isNaN(quantity) && quantity !== 0) {
                        p.value = (total / quantity).toFixed(4);
                        p.classList.add('calculated');
                        q.classList.remove('calculated');
                    } else if (!isNaN(price) && price !== 0) {
                        q.value = (total / price).toFixed(4);
                        q.classList.add('calculated');
                        p.classList.remove('calculated');
                    }
                }
            }
            if (q.value === "") q.classList.remove('calculated');
            if (p.value === "") p.classList.remove('calculated');
            if (t.value === "") t.classList.remove('calculated');
        }

        function addEntry() {
            const asset = document.getElementById('asset-name').value || 'Asset';
            const price = parseFloat(document.getElementById('buy-price').value);
            const quantity = parseFloat(document.getElementById('buy-quantity').value);
            const total = parseFloat(document.getElementById('buy-total').value);
            const order = document.getElementById('buy-order').value || '-';

            if (!isNaN(total) && !isNaN(quantity) && quantity > 0) {
                entries.push({ asset, price: total/quantity, quantity, order });
                updateUI();
                clearInputs();
            } else if (!isNaN(price) && !isNaN(quantity) && quantity > 0) {
                entries.push({ asset, price, quantity, order });
                updateUI();
                clearInputs();
            }
        }

        function removeEntry(index) {
            entries.splice(index, 1);
            updateUI();
        }

        function clearInputs() {
            document.getElementById('buy-price').value = '';
            document.getElementById('buy-quantity').value = '';
            document.getElementById('buy-total').value = '';
            document.getElementById('buy-order').value = '';
            document.querySelectorAll('input').forEach(i => i.classList.remove('calculated'));
        }

        function updateUI() {
            const tbody = document.getElementById('entries-body');
            tbody.innerHTML = '';
            let totalInvestment = 0;

            entries.forEach((entry, index) => {
                const total = entry.price * entry.quantity;
                totalInvestment += total;
                tbody.innerHTML += `<tr>
                    <td><span class="asset-tag">${entry.asset}</span> <small>${entry.order}</small></td>
                    <td>${entry.quantity.toLocaleString('nl-BE')}</td>
                    <td>€ ${entry.price.toLocaleString('nl-BE', {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
                    <td>€ ${total.toLocaleString('nl-BE', {minimumFractionDigits: 2})}</td>
                    <td><button class="btn-remove" onclick="removeEntry(${index})">X</button></td>
                </tr>`;
            });

            document.getElementById('total-investment').innerText = `€ ${totalInvestment.toLocaleString('nl-BE', {minimumFractionDigits: 2})}`;
            updateCharts(totalInvestment);
        }

        function updateCharts(np1) {
            if (entries.length === 0) {
                if (valueChart) valueChart.destroy();
                if (taxChart) taxChart.destroy();
                return;
            }

            const labels = [];
            const valueData = [];
            const gainData = [];
            const taxData = [];

            for (let growth = -20; growth <= 300; growth += 10) {
                const np2 = np1 * (1 + growth / 100);
                const gain = np2 - np1;
                const tax = Math.max(gain - 10000, 0);
                
                labels.push(`${growth}%`);
                valueData.push(np2);
                gainData.push(gain);
                taxData.push(tax);
            }

            // --- Value Chart ---
            const ctxV = document.getElementById('valueChart').getContext('2d');
            if (valueChart) valueChart.destroy();
            valueChart = new Chart(ctxV, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Totale Portefeuillewaarde (€)',
                        data: valueData,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false, title: { display: true, text: 'Euro (€)' } } }
                }
            });

            // --- Tax & Gain Chart ---
            const ctxT = document.getElementById('taxChart').getContext('2d');
            if (taxChart) taxChart.destroy();
            taxChart = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Meerwaarde (€)',
                            data: gainData,
                            borderColor: '#64748b',
                            borderDash: [5, 5],
                            tension: 0.3
                        },
                        {
                            label: 'Te betalen belasting (€)',
                            data: taxData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Euro (€)' } } }
                }
            });
        }
    </script>
</body>
</html>
