<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meerwaardebelasting Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --accent: #f1f5f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); line-height: 1.5; padding: 1.5rem; max-width: 1100px; margin: 0 auto;
        }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 2rem; border: 1px solid var(--border); }
        h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; color: var(--primary); }
        h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 1.25rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
        
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem;
            background: var(--accent); padding: 1.25rem; border-radius: 8px; align-items: flex-end; margin-bottom: 2rem;
        }
        .input-field { display: flex; flex-direction: column; gap: 0.3rem; }
        label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--secondary); }
        input { padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background: white; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        input.auto { color: #2563eb; font-weight: 600; background: #eff6ff; }
        
        button { padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-add { background-color: var(--primary); color: white; }
        .btn-add:hover { background-color: #1d4ed8; }
        .btn-clear { background-color: #94a3b8; color: white; font-size: 0.8rem; }

        .sim-section { background: #1e293b; color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
        .sim-control { flex: 1; min-width: 250px; }
        .sim-label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: 700; font-size: 0.9rem; }
        input[type=range] { width: 100%; height: 8px; border-radius: 5px; background: #475569; outline: none; -webkit-appearance: none; cursor: pointer; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat-card { background: white; padding: 1.25rem; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; color: var(--text); }
        .stat-label { font-size: 0.75rem; color: var(--secondary); font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 1.75rem; font-weight: 800; margin-top: 0.25rem; }

        .asset-group { margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.75rem; color: var(--secondary); border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
        tr.asset-summary { background: #f8fafc; font-weight: 700; }

        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 1.5rem; }
        .chart-box { height: 320px; }
        .hint { font-size: 0.65rem; font-weight: 400; color: #f59e0b; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Meerwaardebelasting Calculator</h1>
        
        <div class="form-grid">
            <div class="input-field">
                <label>Asset Naam</label>
                <input type="text" id="in-asset" placeholder="bijv. BTC">
            </div>
            <div class="input-field">
                <label>Aantal <span class="hint">(geheel aanbevolen)</span></label>
                <input type="number" id="in-qty" placeholder="0" oninput="triangulate('qty')">
            </div>
            <div class="input-field">
                <label>Eenheidsprijs (€)</label>
                <input type="number" id="in-price" placeholder="0.00" oninput="triangulate('price')">
            </div>
            <div class="input-field">
                <label>Totale Aankoop (€)</label>
                <input type="number" id="in-total" placeholder="0.00" oninput="triangulate('total')">
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-add" onclick="addEntry()">Voeg toe</button>
                <button class="btn-clear" onclick="resetForm()">Wis</button>
            </div>
        </div>

        <div id="asset-list"></div>
    </div>

    <!-- Simulation Controls -->
    <div class="sim-section">
        <div class="sim-control">
            <div class="sim-label">
                <span>SIMULATIE: Portefeuille Groei</span>
                <span id="growth-pct" style="color: var(--success);">+10%</span>
            </div>
            <input type="range" id="growth-slider" min="-50" max="100" value="10" oninput="updateSimulation()">
        </div>
        <div class="summary-grid" style="flex: 2;">
            <div class="stat-card">
                <span class="stat-label">Investering (np₁)</span>
                <span class="stat-value" id="stat-np1">€ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Nieuwe Waarde (np₂)</span>
                <span class="stat-value" id="stat-np2">€ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Belasting</span>
                <span class="stat-value" id="stat-tax" style="color: var(--danger);">€ 0,00</span>
            </div>
        </div>
    </div>

    <div class="charts-container">
        <div class="card">
            <h2>Groeiprojectie Belasting</h2>
            <div class="chart-box"><canvas id="taxChart"></canvas></div>
        </div>
        <div class="card">
            <h2>Portefeuille Waarde</h2>
            <div class="chart-box"><canvas id="valueChart"></canvas></div>
        </div>
    </div>

    <script>
        let entries = [];
        let charts = { tax: null, value: null };
        let lastEdited = [];

        function triangulate(id) {
            const qty = document.getElementById('in-qty'), price = document.getElementById('in-price'), total = document.getElementById('in-total');
            lastEdited = lastEdited.filter(f => f !== id);
            lastEdited.push(id);
            if (lastEdited.length > 2) lastEdited.shift();

            const q = parseFloat(qty.value), p = parseFloat(price.value), t = parseFloat(total.value);
            if (lastEdited.length < 2) return;

            const solveFor = ['qty', 'price', 'total'].find(f => !lastEdited.includes(f));
            if (solveFor === 'total') total.value = (q * p).toFixed(2);
            else if (solveFor === 'price') price.value = (t / q).toFixed(4);
            else if (solveFor === 'qty') qty.value = (t / p).toFixed(6);
            
            [qty, price, total].forEach(el => el.classList.toggle('auto', el.value !== '' && !lastEdited.includes(el.id.replace('in-', ''))));
        }

        function addEntry() {
            const asset = document.getElementById('in-asset').value.toUpperCase() || 'ASSET';
            const qty = parseFloat(document.getElementById('in-qty').value);
            const total = parseFloat(document.getElementById('in-total').value);
            if (isNaN(qty) || isNaN(total) || qty <= 0) return;

            entries.push({ asset, qty, total, price: total/qty });
            updateUI();
            resetForm();
        }

        function resetForm() {
            ['in-qty', 'in-price', 'in-total'].forEach(id => {
                const el = document.getElementById(id); el.value = ''; el.className = '';
            });
            lastEdited = [];
        }

        function updateSimulation() {
            const growth = parseFloat(document.getElementById('growth-slider').value);
            document.getElementById('growth-pct').innerText = (growth >= 0 ? '+' : '') + growth + '%';
            updateUI(false);
        }

        function updateUI(reRenderTable = true) {
            let totalNp1 = 0;
            const growth = 1 + (parseFloat(document.getElementById('growth-slider').value) / 100);

            if (reRenderTable) {
                const list = document.getElementById('asset-list');
                list.innerHTML = '';
                const groups = entries.reduce((acc, e) => { (acc[e.asset] = acc[e.asset] || []).push(e); return acc; }, {});
                
                Object.keys(groups).forEach(name => {
                    let aQty = 0, aCost = 0;
                    const rows = groups[name].map(e => {
                        aQty += e.qty; aCost += e.total;
                        return `<tr><td>${name}</td><td>${e.qty}</td><td>€${e.price.toFixed(2)}</td><td>€${e.total.toFixed(2)}</td></tr>`;
                    }).join('');
                    totalNp1 += aCost;
                    list.innerHTML += `<div class="asset-group"><h2>${name}</h2><table><thead><tr><th>Asset</th><th>Aantal</th><th>Prijs</th><th>Totaal</th></tr></thead><tbody>${rows}</tbody><tr class="asset-summary"><td>Totaal ${name}</td><td>${aQty}</td><td>Gem: €${(aCost/aQty).toFixed(2)}</td><td>€${aCost.toFixed(2)}</td></tr></table></div>`;
                });
            } else {
                totalNp1 = entries.reduce((sum, e) => sum + e.total, 0);
            }

            const totalNp2 = totalNp1 * growth;
            const tax = Math.max(totalNp2 - totalNp1 - 10000, 0);

            document.getElementById('stat-np1').innerText = '€' + totalNp1.toLocaleString('nl-BE', {minimumFractionDigits: 2});
            document.getElementById('stat-np2').innerText = '€' + totalNp2.toLocaleString('nl-BE', {minimumFractionDigits: 2});
            document.getElementById('stat-tax').innerText = '€' + tax.toLocaleString('nl-BE', {minimumFractionDigits: 2});

            updateCharts(totalNp1);
        }

        function updateCharts(np1) {
            const labels = [], vData = [], tData = [];
            for (let g = -20; g <= 100; g += 5) {
                const np2 = np1 * (1 + g/100);
                labels.push(`${g}%`);
                vData.push(np2);
                tData.push(Math.max(np2 - np1 - 10000, 0));
            }

            if (charts.tax) charts.tax.destroy();
            charts.tax = new Chart(document.getElementById('taxChart'), {
                type: 'line',
                data: { labels, datasets: [{ label: 'Belasting (€)', data: tData, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.3 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: {
                                color: (context) => context.tick && context.tick.label === '0%' ? 'rgba(15, 23, 42, 0.5)' : 'rgba(0,0,0,0.1)',
                                lineWidth: (context) => context.tick && context.tick.label === '0%' ? 2 : 1
                            }
                        }
                    }
                }
            });

            if (charts.value) charts.value.destroy();
            charts.value = new Chart(document.getElementById('valueChart'), {
                type: 'line',
                data: { labels, datasets: [{ label: 'Waarde (€)', data: vData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.3 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            grid: {
                                color: (context) => context.tick && context.tick.label === '0%' ? 'rgba(15, 23, 42, 0.5)' : 'rgba(0,0,0,0.1)',
                                lineWidth: (context) => context.tick && context.tick.label === '0%' ? 2 : 1
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
